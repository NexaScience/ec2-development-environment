# ============================================================
# tmux config for ttyd + mobile browser
# ============================================================

# マウスモードOFF: ブラウザ(xterm.js)にテキスト選択を委譲し、スマホでもコピー可能にする
set -g mouse off

# OSC 52 クリップボード連携: tmuxコピーモードの内容をブラウザクリップボードに反映
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;c;%p2%s\a'

# エスケープ遅延を除去（通常のターミナルと同じレスポンス）
set -sg escape-time 0

# スクロールバック履歴を増加
set -g history-limit 50000

# 256色サポート
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm*:Tc'

# ウィンドウ・ペイン番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じた時に番号を詰める
set -g renumber-windows on

# ステータスバーをシンプルに
set -g status-style 'bg=colour235 fg=colour255'
set -g status-left '[#S] '
set -g status-right '%H:%M'
set -g status-left-length 20
